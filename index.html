<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sergio@portfolio</title>
<style>
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes typewriter { from{width:0} to{width:100%} }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .term-wrap {
    background: #0a0a0a;
    border-radius: 10px;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    width: 100%;
    max-width: 580px;
  }

  .term-bar {
    background: #1a1a1a;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #222;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .term-title { color: #666; font-size: 12px; margin: 0 auto; letter-spacing: .5px; }

  .term-body { padding: 24px 28px 32px; }

  .prompt { color: #00e676; font-size: 15px; font-weight: bold; }
  .path { color: #536dfe; }

  .cursor {
    display: inline-block;
    width: 9px; height: 16px;
    background: #00e676;
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }

  .output-line { color: #aaa; font-size: 13px; margin: 4px 0; line-height: 1.6; }
  .output-line span.key { color: #00e676; min-width: 90px; display: inline-block; }
  .output-line span.val { color: #eee; }

  .divider { border: none; border-top: 1px solid #1e1e1e; margin: 16px 0; }

  .cmd-line { margin-top: 20px; }
  .cmd-line .prompt { font-size: 13px; }

  .skills-label { color: #666; font-size: 11px; letter-spacing: .5px; margin-bottom: 8px; }

  .tag {
    display: inline-block;
    border: 1px solid #333;
    color: #666;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    margin: 2px;
    font-family: 'Courier New', monospace;
  }
  .tag.active { border-color: #00e676; color: #00e676; }

  .link-row { display: flex; gap: 12px; margin-top: 14px; flex-wrap: wrap; }

  .term-link {
    color: #0a0a0a;
    background: #00e676;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: bold;
    padding: 6px 14px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: .5px;
    cursor: pointer;
    transition: background .15s, color .15s;
    border: none;
  }
  .term-link.outline {
    background: transparent;
    color: #00e676;
    border: 1px solid #00e676;
  }
  .term-link:hover { background: #fff; color: #0a0a0a; }
  .term-link.outline:hover { background: #00e676; color: #0a0a0a; }

  .type-anim {
    overflow: hidden;
    white-space: nowrap;
    display: inline-block;
    animation: typewriter 1.2s steps(30) .3s both;
  }
</style>
</head>
<body>

<div class="term-wrap">
  <div class="term-bar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#ffbd2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span class="term-title">sergio@portfolio — bash</span>
  </div>

  <div class="term-body">

    <div>
      <span class="prompt">sergio<span style="color:#666">@</span><span class="path">portfolio</span><span style="color:#666">:~$</span></span>
      <span style="color:#eee;font-size:14px;margin-left:8px">whoami</span>
    </div>

    <div style="margin-top:14px">
      <div class="output-line"><span class="key">name</span><span class="val">Sergio</span></div>
      <div class="output-line"><span class="key">role</span><span class="val"><span class="type-anim">Cybersecurity Student</span></span></div>
      <div class="output-line"><span class="key">focus</span><span class="val">Ethical Hacking · Pentesting · Labs</span></div>
      <div class="output-line"><span class="key">status</span><span style="color:#00e676">[ active ]</span></div>
    </div>

    <hr class="divider">

    <div class="skills-label">SKILLS</div>
    <div>
      <span class="tag active">network security</span>
      <span class="tag active">kali linux</span>
      <span class="tag active">ctf</span>
      <span class="tag">web hacking</span>
      <span class="tag">OSINT</span>
      <span class="tag">scripting</span>
    </div>

    <hr class="divider">

    <div class="cmd-line">
      <span class="prompt" style="font-size:13px">sergio<span style="color:#666">@</span><span class="path">portfolio</span><span style="color:#666">:~$</span></span>
      <span style="color:#eee;font-size:13px;margin-left:8px">ls ./links</span>
    </div>

    <div class="link-row">
      <a class="term-link outline" href="https://v411ux.github.io">./portfolio</a>
      <a class="term-link" href="https://github.com/v411ux">./github</a>
      <a class="term-link outline" href="cv.html" target="_blank">./cv</a>
    </div>

    <div style="margin-top:20px">
      <span class="prompt" style="font-size:13px">sergio<span style="color:#666">@</span><span class="path">portfolio</span><span style="color:#666">:~$</span></span>
      <span class="cursor"></span>
    </div>

  </div>
</div>

</body>
</html>
